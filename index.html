<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ThoughtFlows AR Business Card</title>
  
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .mindar-ui-overlay {
      z-index: 2;
    }

    #audio-prompt {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      color: #00e5ff;
      padding: 10px 20px;
      border: 1px solid #00e5ff;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.5px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
      pointer-events: none;
    }
  </style>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <script>
    let hasPlayedIntro = false;
    let audioUnlocked = false;

    // Pauses video audio stream immediately upon icon click interaction
    AFRAME.registerComponent('url-opener', {
      schema: { link: { type: 'string' } },
      init: function () {
        const targetUrl = this.data.link;
        this.el.addEventListener('click', function (evt) {
          evt.stopPropagation(); 
          
          // Force the media asset layout to pause right before navigating away
          const video = document.querySelector('#cardVideo');
          if (video) {
            video.pause();
            console.log("Link interaction registered - video audio stream paused.");
          }

          if (targetUrl) {
            window.open(targetUrl, '_self'); // '_self' works better for system deep links like tel:
          }
        });
      }
    });

    AFRAME.registerComponent('ar-target-listener', {
      init: function () {
        const video = document.querySelector('#cardVideo');
        const videoPlane = document.querySelector('#videoPlane');
        const introGroup = document.querySelector('#introGroup');
        
        const btnInsta = document.querySelector('#btnInsta');
        const btnWeb = document.querySelector('#btnWeb');
        const btnCall = document.querySelector('#btnCall');

        const toggleSocials = (show) => {
          const state = show ? 'true' : 'false';
          btnInsta.setAttribute('visible', state);
          btnWeb.setAttribute('visible', state);
          btnCall.setAttribute('visible', state);
        };

        this.el.addEventListener("targetFound", () => {
          console.log("Business card tracked.");
          
          if (!hasPlayedIntro) {
            hasPlayedIntro = true;

            introGroup.setAttribute('visible', 'true');
            videoPlane.setAttribute('visible', 'false');
            toggleSocials(false); 

            introGroup.emit('start-intro-anim');
            
            setTimeout(() => {
              introGroup.setAttribute('visible', 'false');
              videoPlane.setAttribute('visible', 'true');
              toggleSocials(true); 
              
              if (video) {
                if (audioUnlocked) {
                  video.muted = false;
                }
                video.play().catch(error => console.warn("Autoplay handler caught:", error));
              }
            }, 3500); 

          } else {
            introGroup.setAttribute('visible', 'false');
            videoPlane.setAttribute('visible', 'true');
            toggleSocials(true);
            
            // If the video was paused by clicking an icon, scanning it again resumes playback seamlessly
            if (video) {
              if (audioUnlocked) {
                video.muted = false;
              }
              video.play().catch(error => console.warn("Autoplay handler caught:", error));
            }
          }
        });

        this.el.addEventListener("targetLost", () => {
          console.log("Tracking lost - pausing video.");
          if (video) {
            video.pause();
          }
        });
      }
    });

    function unlockAudioContext() {
      const video = document.querySelector('#cardVideo');
      const videoPlane = document.querySelector('#videoPlane');
      
      if (video && !audioUnlocked) {
        video.muted = false;
        audioUnlocked = true;
        
        video.play().then(() => {
          if (videoPlane.getAttribute('visible') === 'false') {
            video.pause();
            video.currentTime = 0;
          }
        }).catch(err => console.warn("Audio Context unlock error:", err));
      }
      
      const prompt = document.querySelector('#audio-prompt');
      if (prompt) prompt.style.display = 'none';
    }
  </script>
</head>

<body onclick="unlockAudioContext();">

  <div id="audio-prompt">🔊 TAP ANYWHERE TO ENABLE SOUND</div>

  <a-scene
    mindar-image="imageTargetSrc: ./tf-hydrabad.mind; filterMinCF:0.001; filterBeta:0.01; uiLoading:yes; uiScanning:yes;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="cardVideo" src=".\assets\portraitvideo.mp4" loop="true" crossorigin="anonymous" playsinline
        webkit-playsinline muted autoplay></video>

      <img id="logoImg" src="./assets/tflogo.png" crossorigin="anonymous">

      <img id="instaIcon" src="./assets/insts.png" crossorigin="anonymous">
      <img id="webIcon" src="./assets/web.png" crossorigin="anonymous">
      
      <img id="phoneIcon" src=".\assets\call.png" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"
      raycaster="objects: .clickable; far: 10000; interval: 100;">
    </a-camera>

    <a-entity mindar-image-target="targetIndex: 0" ar-target-listener>
      
      <a-image src="#logoImg" position="0 0.5 0" width="0.8" height="0.22" transparent="true"></a-image>

      <!-- ANIMATED 3D TEXT FRAME -->
      <a-entity id="introGroup" position="0 0 0.01" scale="0.1 0.1 0.1" visible="false"
                animation="property: scale; to: 1 1 1; dur: 800; easing: easeOutBack; startEvents: start-intro-anim">
        <a-plane color="#0c101b" width="1.05" height="0.62" opacity="0.92"></a-plane>
        <a-text 
          value="LET'S EXPLORE\nTHOUGHTFLOWS HYDERABAD" 
          color="#00e5ff" 
          align="center" 
          width="1.5" 
          font="kelsonsans"
          position="0 0 0.02"
          animation="property: scale; to: 1.04 1.04 1.04; dir: alternate; dur: 1000; loop: true; easing: easeInOutSine">
        </a-text>
      </a-entity>

      <!-- VIDEO PLANE -->
      <a-video id="videoPlane" class="clickable" src="#cardVideo" position="0 0 0" width="1" height="1.6" visible="false"></a-video>

      <!-- SOCIAL & CALL INTERACTION ICONS -->
      <a-image id="btnInsta" class="clickable" url-opener="link: https://www.instagram.com/thoughtflowshyderabad/" src="#instaIcon" 
               position="0.63 0.2 0" width="0.15" height="0.15" transparent="true" visible="false"></a-image>

      <a-image id="btnWeb" class="clickable" url-opener="link: https://www.thoughtflows.in/" src="#webIcon" 
               position="0.63 0 0" width="0.15" height="0.15" transparent="true" visible="false"></a-image>

      <!-- CHANGED: Replaced Facebook plane with a Dial/Call trigger -->
      <a-image id="btnCall" class="clickable" url-opener="link: tel:+918790751742" src="#phoneIcon" 
               position="0.63 -0.2 0" width="0.15" height="0.15" transparent="true" visible="false"></a-image>

    </a-entity>

  </a-scene>
</body>

</html>
